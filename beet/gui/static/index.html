<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>BEET 2.0 — LLM Authorship Detection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #0e1116;
      --panel: #161b22;
      --ink: #e6edf3;
      --muted: #8b949e;
      --line: #30363d;
      --red: #d1495b;
      --amber: #e4a33a;
      --yellow: #dbcd53;
      --green: #57a773;
      --uncertain: #7a7a7a;
    }
    html, body {
      margin: 0; padding: 0; background: var(--bg); color: var(--ink);
      font: 14px/1.5 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    header { padding: 16px 24px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 16px; margin: 0; font-weight: 600; }
    header .sub { color: var(--muted); font-size: 12px; }
    main { display: grid; grid-template-columns: 1fr 420px; gap: 16px; padding: 16px 24px; max-width: 1400px; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 6px; padding: 16px; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
    textarea {
      width: 100%; box-sizing: border-box; min-height: 320px; background: #0b0f14;
      border: 1px solid var(--line); color: var(--ink); border-radius: 4px; padding: 12px;
      font: 13px/1.45 ui-monospace, Menlo, "Consolas", monospace; resize: vertical;
    }
    button {
      background: #1f6feb; color: white; border: 0; padding: 9px 16px; border-radius: 5px;
      font-weight: 600; cursor: pointer; margin-top: 10px;
    }
    button:hover { background: #1a5ac7; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .badge {
      display: inline-block; padding: 4px 10px; border-radius: 4px; font-weight: 700;
      letter-spacing: 0.05em; font-size: 13px;
    }
    .RED { background: var(--red); color: white; }
    .AMBER { background: var(--amber); color: #2a1e00; }
    .YELLOW { background: var(--yellow); color: #2a2500; }
    .GREEN { background: var(--green); color: white; }
    .UNCERTAIN, .MIXED { background: var(--uncertain); color: white; }
    .gauge {
      position: relative; height: 8px; background: #21262d; border-radius: 4px; margin: 10px 0 6px;
    }
    .gauge .fill { position: absolute; top: 0; left: 0; height: 100%; background: #3e8cf8; border-radius: 4px; }
    .gauge .ci { position: absolute; top: -4px; height: 16px; border-left: 1px solid #8b949e; border-right: 1px solid #8b949e; }
    .metrics { display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; font-size: 13px; margin-top: 10px; }
    .metrics .k { color: var(--muted); }
    .contribs { margin-top: 12px; }
    .contribs .row { display: grid; grid-template-columns: 1fr auto; padding: 3px 0; border-bottom: 1px dashed var(--line); font-size: 12px; }
    .contribs .row:last-child { border-bottom: 0; }
    .reason { color: var(--muted); font-size: 12px; margin-top: 10px; font-style: italic; }
    .detectors { margin-top: 8px; font-size: 11px; color: var(--muted); }
    .pred-set { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
    .err { color: var(--red); margin-top: 10px; font-size: 13px; }
    .feedback { margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--line); }
    .feedback .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .feedback button.fb {
      background: transparent; border: 1px solid var(--line); color: var(--ink);
      padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: 600;
      cursor: pointer; margin-top: 0;
    }
    .feedback button.fb:hover { border-color: #1f6feb; }
    .feedback button.fb.human { color: var(--green); }
    .feedback button.fb.llm { color: var(--red); }
    .feedback input {
      flex: 1 1 180px; min-width: 0; background: #0b0f14;
      border: 1px solid var(--line); color: var(--ink); border-radius: 4px;
      padding: 6px 8px; font-size: 12px;
    }
    .feedback .status { color: var(--muted); font-size: 12px; min-height: 16px; }
    .feedback .status.ok { color: var(--green); }
    .feedback .status.err { color: var(--red); }
    details.section { margin-top: 14px; border-top: 1px solid var(--line); padding-top: 10px; }
    details.section > summary {
      cursor: pointer; font-size: 12px; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.04em; list-style: none; user-select: none;
    }
    details.section > summary::-webkit-details-marker { display: none; }
    details.section > summary::before {
      content: "▸ "; display: inline-block; width: 14px;
    }
    details.section[open] > summary::before { content: "▾ "; }
    table.layers { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 12px; }
    table.layers th {
      text-align: left; color: var(--muted); font-weight: 500; padding: 4px 6px;
      border-bottom: 1px solid var(--line); text-transform: none; letter-spacing: 0;
    }
    table.layers td {
      padding: 4px 6px; border-bottom: 1px dashed var(--line); font-family: ui-monospace, Menlo, Consolas, monospace;
    }
    table.layers tr.row { cursor: pointer; }
    table.layers tr.row:hover td { background: #0b0f14; }
    table.layers tr.sig td {
      font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 11px;
      color: var(--muted); background: #0b0f14; padding: 8px 12px; white-space: pre-wrap;
      word-break: break-word;
    }
    table.layers .badge { font-size: 11px; padding: 2px 6px; }
    .contrib-row {
      display: grid; grid-template-columns: 160px 1fr 56px; gap: 8px; align-items: center;
      padding: 2px 0; font-size: 12px; font-family: ui-monospace, Menlo, Consolas, monospace;
    }
    .contrib-row .name { color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .contrib-row .bar { height: 6px; background: #21262d; border-radius: 3px; position: relative; }
    .contrib-row .bar .fill { position: absolute; top: 0; height: 100%; border-radius: 3px; }
    .contrib-row .bar .fill.pos { background: #3e8cf8; left: 50%; }
    .contrib-row .bar .fill.neg { background: #d1495b; right: 50%; }
    .contrib-row .bar .axis { position: absolute; top: -2px; bottom: -2px; left: 50%; width: 1px; background: var(--line); }
    .contrib-row .val { text-align: right; color: var(--muted); }
    .sort-controls { display: flex; gap: 6px; margin: 8px 0; flex-wrap: wrap; }
    .sort-controls button {
      background: transparent; border: 1px solid var(--line); color: var(--muted);
      padding: 3px 8px; font-size: 11px; border-radius: 3px; cursor: pointer; margin: 0;
      font-weight: normal;
    }
    .sort-controls button.active { color: var(--ink); border-color: #1f6feb; }
    @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<header>
  <h1>BEET 2.0</h1>
  <span class="sub">LLM Authorship Detection</span>
</header>
<main>
  <section class="panel">
    <label for="text">Submission text</label>
    <textarea id="text" placeholder="Paste text to analyze..."></textarea>
    <button id="go">Analyze</button>
    <div id="err" class="err" hidden></div>
  </section>
  <section class="panel" id="result" hidden>
    <label>Determination</label>
    <span id="badge" class="badge">—</span>
    <div class="gauge"><div class="fill" id="fill"></div><div class="ci" id="ci"></div></div>
    <div class="metrics">
      <div class="k">P(LLM)</div>        <div id="p"></div>
      <div class="k">Confidence CI</div> <div id="ciText"></div>
      <div class="k">Prediction set</div><div id="predSet"></div>
    </div>
    <div class="reason" id="reason"></div>
    <div class="contribs">
      <label>Top contributing signals</label>
      <div id="contribs"></div>
    </div>
    <details class="section" id="layersSection">
      <summary>Detector breakdown</summary>
      <table class="layers"><thead><tr>
        <th>id</th><th>domain</th><th style="text-align:right">raw</th>
        <th style="text-align:right">p(llm)</th><th style="text-align:right">conf</th>
        <th>verdict</th>
      </tr></thead><tbody id="layersBody"></tbody></table>
    </details>
    <details class="section" id="allContribsSection">
      <summary>All feature contributions</summary>
      <div class="sort-controls" id="sortControls">
        <button data-sort="abs" class="active">|value| ↓</button>
        <button data-sort="desc">value ↓</button>
        <button data-sort="asc">value ↑</button>
        <button data-sort="alpha">a–z</button>
      </div>
      <div id="allContribs"></div>
    </details>
    <div class="detectors" id="detectors"></div>
    <div class="feedback" id="feedback" hidden>
      <label>Reviewer feedback</label>
      <div class="row">
        <button class="fb human" id="fbHuman" title="Confirm this submission is human-written">Human</button>
        <button class="fb llm" id="fbLLM" title="Confirm this submission is LLM-generated">LLM</button>
        <input id="fbNotes" placeholder="Optional notes…" />
      </div>
      <div class="status" id="fbStatus"></div>
    </div>
  </section>
</main>
<script>
const $ = (id) => document.getElementById(id);

// beetApi: dual-mode client. Uses Tauri invoke() when running inside the
// Tauri shell (detected via window.__TAURI_INTERNALS__), otherwise falls back
// to fetch() against the local HTTP server. Same call shape for both.
const beetApi = (() => {
  const isTauri = !!(window.__TAURI_INTERNALS__ || window.__TAURI__);
  if (isTauri) {
    const invoke = (window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.invoke)
      || (window.__TAURI_INTERNALS__ && window.__TAURI_INTERNALS__.invoke);
    if (typeof invoke !== "function") {
      throw new Error("Tauri detected but invoke() is unavailable");
    }
    return {
      mode: "tauri",
      analyze: (text, submission_id) => invoke("analyze", { text, submissionId: submission_id || null }),
      analyzeBatch: (items) => invoke("analyze_batch", { items }),
      feedback: (payload) => invoke("feedback", {
        text: payload.text,
        confirmedLabel: payload.confirmed_label,
        submissionId: payload.submission_id || null,
        reviewerNotes: payload.reviewer_notes || null,
      }),
      health: () => invoke("health"),
    };
  }
  const post = async (path, body) => {
    const res = await fetch(path, {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify(body || {}),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "request failed");
    return data;
  };
  return {
    mode: "http",
    analyze: (text, submission_id) => post("/analyze", { text, submission_id }),
    analyzeBatch: (items) => post("/batch", { items }),
    feedback: (payload) => post("/feedback", payload),
    health: () => fetch("/health").then(r => r.json()),
  };
})();

let lastAnalysis = null;  // {text, submission_id} — captured at analyze() so feedback can echo it back

$("go").addEventListener("click", async () => {
  const text = $("text").value.trim();
  const err = $("err");
  const btn = $("go");
  err.hidden = true;
  if (!text) { err.textContent = "Enter some text."; err.hidden = false; return; }
  btn.disabled = true; btn.textContent = "Analyzing…";
  try {
    const data = await beetApi.analyze(text);
    lastAnalysis = { text, submission_id: data.submission_id || "" };
    render(data);
    $("feedback").hidden = false;
    $("fbStatus").textContent = "";
    $("fbStatus").className = "status";
    $("fbNotes").value = "";
  } catch (e) { err.textContent = e.message || String(e); err.hidden = false; }
  finally { btn.disabled = false; btn.textContent = "Analyze"; }
});

async function submitFeedback(label) {
  if (!lastAnalysis) return;
  const status = $("fbStatus");
  status.className = "status";
  status.textContent = "Submitting…";
  const [h, l] = [$("fbHuman"), $("fbLLM")];
  h.disabled = true; l.disabled = true;
  try {
    await beetApi.feedback({
      text: lastAnalysis.text,
      confirmed_label: label,
      submission_id: lastAnalysis.submission_id,
      reviewer_notes: $("fbNotes").value.trim() || null,
    });
    status.className = "status ok";
    status.textContent = `Recorded as ${label === 1 ? "LLM" : "human"}.`;
  } catch (e) {
    status.className = "status err";
    status.textContent = e.message || String(e);
  } finally {
    h.disabled = false; l.disabled = false;
  }
}
$("fbHuman").addEventListener("click", () => submitFeedback(0));
$("fbLLM").addEventListener("click", () => submitFeedback(1));

function render(r) {
  $("result").hidden = false;
  const badge = $("badge");
  badge.className = "badge " + (r.determination || "UNCERTAIN");
  badge.textContent = r.determination;
  const p = Number(r.p_llm || 0);
  $("fill").style.width = (p * 100).toFixed(1) + "%";
  const ci = r.confidence_interval || [0, 0];
  $("ci").style.left = (ci[0] * 100).toFixed(1) + "%";
  $("ci").style.width = ((ci[1] - ci[0]) * 100).toFixed(1) + "%";
  $("p").textContent = p.toFixed(3);
  $("ciText").textContent = "[" + ci[0].toFixed(2) + ", " + ci[1].toFixed(2) + "]";
  const preds = (r.prediction_set || []).map(l => `<span class="badge ${l}">${l}</span>`).join(" ");
  $("predSet").innerHTML = `<div class="pred-set">${preds}</div>`;
  $("reason").textContent = r.reason || "";
  const contribs = (r.top_features || []).map(f => {
    const feat = f.feature || f[0];
    const val = f.contribution != null ? f.contribution : (f[1] || 0);
    const sign = val >= 0 ? "+" : "";
    return `<div class="row"><div>${feat}</div><div>${sign}${Number(val).toFixed(3)}</div></div>`;
  }).join("");
  $("contribs").innerHTML = contribs || "<div class='k'>no contributions reported</div>";
  $("detectors").textContent = "Detectors run: " + (r.detectors_run || []).join(", ");
  renderLayers(r.layer_results || []);
  renderAllContribs(r.feature_contributions || {});
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  })[c]);
}

function formatSignal(v) {
  if (v === null || v === undefined) return String(v);
  if (typeof v === "number") return Number.isInteger(v) ? String(v) : v.toFixed(4);
  if (typeof v === "string") return v;
  try { return JSON.stringify(v); } catch { return String(v); }
}

function renderLayers(layers) {
  const body = $("layersBody");
  if (!layers.length) {
    body.innerHTML = "<tr><td colspan='6' class='k'>no layer results</td></tr>";
    return;
  }
  body.innerHTML = layers.map((l, i) => {
    const verdict = l.determination || "UNCERTAIN";
    const sig = l.signals || {};
    const sigRows = Object.keys(sig).length
      ? Object.entries(sig).map(([k, v]) =>
          `${escapeHtml(k)}: ${escapeHtml(formatSignal(v))}`).join("\n")
      : "(no signals)";
    return `
      <tr class="row" data-idx="${i}">
        <td>${escapeHtml(l.layer_id || "")}</td>
        <td>${escapeHtml(l.domain || "")}</td>
        <td style="text-align:right">${Number(l.raw_score || 0).toFixed(2)}</td>
        <td style="text-align:right">${Number(l.p_llm || 0).toFixed(3)}</td>
        <td style="text-align:right">${Number(l.confidence || 0).toFixed(2)}</td>
        <td><span class="badge ${verdict}">${verdict}</span></td>
      </tr>
      <tr class="sig" data-idx="${i}" hidden><td colspan="6">${escapeHtml(sigRows)}</td></tr>
    `;
  }).join("");
  body.querySelectorAll("tr.row").forEach(tr => {
    tr.addEventListener("click", () => {
      const idx = tr.dataset.idx;
      const sig = body.querySelector(`tr.sig[data-idx="${idx}"]`);
      if (sig) sig.hidden = !sig.hidden;
    });
  });
}

let _contribs = {};
let _sortMode = "abs";
function renderAllContribs(contribs) {
  _contribs = contribs || {};
  paintContribs();
}
function paintContribs() {
  const entries = Object.entries(_contribs);
  const container = $("allContribs");
  if (!entries.length) {
    container.innerHTML = "<div class='k'>no contributions reported</div>";
    return;
  }
  const sorters = {
    abs: (a, b) => Math.abs(b[1]) - Math.abs(a[1]),
    desc: (a, b) => b[1] - a[1],
    asc: (a, b) => a[1] - b[1],
    alpha: (a, b) => a[0].localeCompare(b[0]),
  };
  entries.sort(sorters[_sortMode] || sorters.abs);
  const maxAbs = Math.max(...entries.map(([, v]) => Math.abs(v)), 1e-9);
  container.innerHTML = entries.map(([name, val]) => {
    const pct = (Math.abs(val) / maxAbs) * 50;
    const cls = val >= 0 ? "pos" : "neg";
    const sign = val >= 0 ? "+" : "";
    return `<div class="contrib-row">
      <div class="name" title="${escapeHtml(name)}">${escapeHtml(name)}</div>
      <div class="bar"><div class="axis"></div><div class="fill ${cls}" style="width:${pct.toFixed(1)}%"></div></div>
      <div class="val">${sign}${Number(val).toFixed(3)}</div>
    </div>`;
  }).join("");
}
document.getElementById("sortControls").addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-sort]");
  if (!btn) return;
  _sortMode = btn.dataset.sort;
  document.querySelectorAll("#sortControls button").forEach(b => b.classList.toggle("active", b === btn));
  paintContribs();
});
</script>
</body>
</html>
