name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

jobs:
  tests:
    name: pytest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,fusion]"

      - name: Run tests
        run: pytest -q

  benchmark-smoke:
    name: HC3 smoke benchmark
    runs-on: ubuntu-latest
    needs: tests
    # Only run on pushes to master — PRs skip the benchmark to keep CI fast.
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,fusion]" huggingface_hub

      - name: Download HC3 finance subset (50 per class)
        run: |
          python scripts/download_hc3.py \
              --subset finance \
              --out data/hc3_finance_smoke.jsonl \
              --max-per-class 50

      - name: Run smoke benchmark (screening profile)
        run: |
          python scripts/run_benchmark.py \
              --dataset data/hc3_finance_smoke.jsonl \
              --config configs/screening.yaml \
              --out ci_benchmark.json

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: hc3-finance-smoke-benchmark
          path: ci_benchmark.json
